version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: "09:00"
      timezone: Asia/Shanghai
    allow:
      - dependency-name: "@ai-sdk/alibaba"
      - dependency-name: "@ai-sdk/amazon-bedrock"
      - dependency-name: "@ai-sdk/anthropic"
      - dependency-name: "@ai-sdk/anthropic-aws"
      - dependency-name: "@ai-sdk/assemblyai"
      - dependency-name: "@ai-sdk/azure"
      - dependency-name: "@ai-sdk/baseten"
      - dependency-name: "@ai-sdk/black-forest-labs"
      - dependency-name: "@ai-sdk/bytedance"
      - dependency-name: "@ai-sdk/cerebras"
      - dependency-name: "@ai-sdk/cohere"
      - dependency-name: "@ai-sdk/deepgram"
      - dependency-name: "@ai-sdk/deepinfra"
      - dependency-name: "@ai-sdk/deepseek"
      - dependency-name: "@ai-sdk/elevenlabs"
      - dependency-name: "@ai-sdk/fal"
      - dependency-name: "@ai-sdk/fireworks"
      - dependency-name: "@ai-sdk/gateway"
      - dependency-name: "@ai-sdk/gladia"
      - dependency-name: "@ai-sdk/google"
      - dependency-name: "@ai-sdk/google-vertex"
      - dependency-name: "@ai-sdk/groq"
      - dependency-name: "@ai-sdk/huggingface"
      - dependency-name: "@ai-sdk/hume"
      - dependency-name: "@ai-sdk/klingai"
      - dependency-name: "@ai-sdk/lmnt"
      - dependency-name: "@ai-sdk/luma"
      - dependency-name: "@ai-sdk/mistral"
      - dependency-name: "@ai-sdk/moonshotai"
      - dependency-name: "@ai-sdk/open-responses"
      - dependency-name: "@ai-sdk/openai"
      - dependency-name: "@ai-sdk/openai-compatible"
      - dependency-name: "@ai-sdk/perplexity"
      - dependency-name: "@ai-sdk/prodia"
      - dependency-name: "@ai-sdk/quiverai"
      - dependency-name: "@ai-sdk/replicate"
      - dependency-name: "@ai-sdk/revai"
      - dependency-name: "@ai-sdk/togetherai"
      - dependency-name: "@ai-sdk/vercel"
      - dependency-name: "@ai-sdk/voyage"
      - dependency-name: "@ai-sdk/xai"
      - dependency-name: "@openrouter/ai-sdk-provider"
    groups:
      provider-sources:
        patterns:
          - "*"
    open-pull-requests-limit: 1
    commit-message:
      prefix: fix
      include: scope
