name: Update Dependabot schema snapshot

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  regenerate:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Verify the PR only changes dependency state
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          unexpected="$(
            gh api "repos/$REPOSITORY/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename' |
              grep -Ev '^(package.json|bun.lock|src/schema-module\.ts|src/zod-module\.ts)$' || true
          )"
          if [ -n "$unexpected" ]; then
            echo "Refusing to run privileged generation for unexpected files:"
            echo "$unexpected"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.repository }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun scripts/check-npm-security.ts --history
      - run: bun install --frozen-lockfile --ignore-scripts --registry=https://registry.npmjs.org
      - run: bun run generate
      - run: bun run test:unit

      - name: Commit the generated snapshot
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- package.json bun.lock .github/dependabot.yml src/schema-module.ts src/zod-module.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json bun.lock .github/dependabot.yml src/schema-module.ts src/zod-module.ts
          git commit -m "chore: regenerate provider schemas"
          git push origin "HEAD:$HEAD_REF"
